services:
  # Static Site (recommandé — zéro serveur Node requis)
  - type: web
    name: sanitarico-website-static
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    pullRequestPreviewsEnabled: true
    headers:
      - path: "/*"
        name: X-Frame-Options
        value: DENY
      - path: "/*"
        name: X-Content-Type-Options
        value: nosniff
      - path: "/*"
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

  # Web Service Node.js (si tu gardes le service existant)
  - type: web
    name: sanitarico-website-node
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
    pullRequestPreviewsEnabled: true
