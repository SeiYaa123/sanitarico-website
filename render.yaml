services:
  # Static Site (recommandé — zéro serveur Node requis)
  - type: web
    name: sanitarico-website-static
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    pullRequestPreviewsEnabled: true
    headers:
      - path: "/*"
        name: X-Frame-Options
        value: DENY
      - path: "/*"
        name: X-Content-Type-Options
        value: nosniff
      - path: "/*"
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: "/*"
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains; preload"
      - path: "/*"
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"
      - path: "/*"
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"

  # Web Service Node.js (si tu gardes le service existant)
  - type: web
    name: sanitarico-website-node
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
    pullRequestPreviewsEnabled: true
